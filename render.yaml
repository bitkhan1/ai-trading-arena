# render.yaml — One-click Render Blueprint for AI Trading Agent Arena
# Deploy at: https://render.com → New+ → Blueprint → connect your repo
#
# Services provisioned:
#   1. arena-db       — PostgreSQL (free tier)
#   2. arena-redis    — Redis / Key Value (free tier)
#   3. arena-backend  — FastAPI web service (Python, free tier)
#   4. arena-frontend — React static site (Vite, no plan needed)

databases:
  - name: arena-db
    databaseName: arena
    user: arena
    plan: free
    region: oregon

services:
  # ─────────────────────────────────────────────
  # Redis / Key Value (leaderboard cache + WebSocket pub/sub)
  # ─────────────────────────────────────────────
  - type: keyvalue
    name: arena-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # ─────────────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────────────
  - type: web
    name: arena-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: arena-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "https://arena-frontend.onrender.com"
      - key: POLYGON_API_KEY
        sync: false
      # Optional — leave blank if not using LLM agents
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ─────────────────────────────────────────────
  # Frontend — React/Vite static site
  # (static sites do not support plan or region fields)
  # ─────────────────────────────────────────────
  - type: web
    name: arena-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: "/*"
        name: X-Frame-Options
        value: DENY
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: arena-backend
          type: web
          property: host
      - key: VITE_WS_URL
        fromService:
          name: arena-backend
          type: web
          property: host
