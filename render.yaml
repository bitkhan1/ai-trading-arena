# render.yaml — AI Trading Agent Arena
# Deploy: render.com → New+ → Blueprint → connect bitkhan1/ai-trading-arena

databases:
  - name: arena-db
    databaseName: arena
    user: arena
    region: oregon

services:
  - type: keyvalue
    name: arena-redis
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  - type: web
    name: arena-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arena-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: arena-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://arena-frontend.onrender.com
      - key: POLYGON_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: arena-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: arena-backend
          type: web
          property: host
      - key: VITE_WS_URL
        fromService:
          name: arena-backend
          type: web
          property: host
